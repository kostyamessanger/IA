name: Build IA APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 platforms;android-33'

      - name: Setup Gradle 8.10
        run: |
          wget https://services.gradle.org/distributions/gradle-8.10-bin.zip
          unzip gradle-8.10-bin.zip
          echo "$PWD/gradle-8.10/bin" >> $GITHUB_PATH

      - name: Create project structure
        run: |
          mkdir -p app/src/main/java/com/ia/installer
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/xml
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/mipmap-mdpi
          mkdir -p app/src/main/res/mipmap-xhdpi
          mkdir -p app/src/main/res/mipmap-xxhdpi
          mkdir -p app/src/main/res/mipmap-xxxhdpi

      - name: Create gradle.properties
        run: |
          cat > gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx2048m
          android.useAndroidX=true
          android.enableJetifier=true
          EOF

      - name: Create build.gradle (root)
        run: |
          cat > build.gradle << 'EOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.7.2'
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          EOF

      - name: Create settings.gradle
        run: |
          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          rootProject.name = "IA"
          include ':app'
          EOF

      - name: Create app/build.gradle
        run: |
          cat > app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
          }
          android {
              namespace 'com.ia.installer'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.ia.installer'
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }
              buildTypes {
                  release {
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.core:core:1.12.0'
          }
          EOF

      - name: Create AndroidManifest.xml (ИСПРАВЛЕННЫЙ)
        run: |
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.REQUEST_INSTALL_PACKAGES" />
              <application android:label="IA" android:icon="@mipmap/ic_launcher">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  <activity android:name=".InstallActivity" android:exported="false" />
                  <provider
                      android:name="androidx.core.content.FileProvider"
                      android:authorities="com.ia.installer.fileprovider"
                      android:exported="false"
                      android:grantUriPermissions="true">
                      <meta-data
                          android:name="android.support.FILE_PROVIDER_PATHS"
                          android:resource="@xml/file_paths" />
                  </provider>
              </application>
          </manifest>
          EOF

      - name: Create MainActivity.java
        run: |
          cat > app/src/main/java/com/ia/installer/MainActivity.java << 'EOF'
          package com.ia.installer;
          import android.app.Activity;
          import android.content.Intent;
          import android.os.Bundle;
          import android.os.Environment;
          import android.view.View;
          import android.widget.ArrayAdapter;
          import android.widget.ListView;
          import android.widget.Toast;
          import androidx.core.app.ActivityCompat;
          import androidx.core.content.ContextCompat;
          import android.Manifest;
          import android.content.pm.PackageManager;
          import java.io.File;
          import java.util.ArrayList;
          import java.util.Arrays;
          public class MainActivity extends Activity {
              private ListView listView;
              private ArrayAdapter<String> adapter;
              private ArrayList<String> items = new ArrayList<>();
              private ArrayList<String> paths = new ArrayList<>();
              private static final int PERMISSION_REQUEST = 100;
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  listView = findViewById(R.id.listView);
                  adapter = new ArrayAdapter<>(this, android.R.layout.simple_list_item_1, items);
                  listView.setAdapter(adapter);
                  checkPermissions();
                  listView.setOnItemClickListener((parent, view, position, id) -> {
                      String filePath = paths.get(position);
                      if (filePath.endsWith(".apk")) {
                          Intent intent = new Intent(MainActivity.this, InstallActivity.class);
                          intent.putExtra("apk_path", filePath);
                          startActivity(intent);
                      } else {
                          Toast.makeText(this, "Выберите APK-файл", Toast.LENGTH_SHORT).show();
                      }
                  });
              }
              private void checkPermissions() {
                  if (ContextCompat.checkSelfPermission(this, Manifest.permission.READ_EXTERNAL_STORAGE) != PackageManager.PERMISSION_GRANTED) {
                      ActivityCompat.requestPermissions(this, new String[]{Manifest.permission.READ_EXTERNAL_STORAGE, Manifest.permission.WRITE_EXTERNAL_STORAGE}, PERMISSION_REQUEST);
                  } else {
                      loadApkFiles();
                  }
              }
              private void loadApkFiles() {
                  items.clear();
                  paths.clear();
                  File dir = Environment.getExternalStorageDirectory();
                  File[] files = dir.listFiles((dir1, name) -> name.toLowerCase().endsWith(".apk"));
                  if (files != null && files.length > 0) {
                      for (File file : files) {
                          items.add("📦 " + file.getName());
                          paths.add(file.getAbsolutePath());
                      }
                  } else {
                      items.add("APK-файлы не найдены");
                  }
                  adapter.notifyDataSetChanged();
              }
              @Override
              public void onRequestPermissionsResult(int requestCode, String[] permissions, int[] grantResults) {
                  super.onRequestPermissionsResult(requestCode, permissions, grantResults);
                  if (requestCode == PERMISSION_REQUEST) {
                      if (grantResults.length > 0 && grantResults[0] == PackageManager.PERMISSION_GRANTED) {
                          loadApkFiles();
                      } else {
                          Toast.makeText(this, "❌ Без разрешения приложение не работает!", Toast.LENGTH_LONG).show();
                      }
                  }
              }
          }
          EOF

      - name: Create InstallActivity.java
        run: |
          cat > app/src/main/java/com/ia/installer/InstallActivity.java << 'EOF'
          package com.ia.installer;
          import android.app.Activity;
          import android.content.Intent;
          import android.content.pm.PackageManager;
          import android.net.Uri;
          import android.os.Build;
          import android.os.Bundle;
          import android.os.Environment;
          import android.provider.Settings;
          import android.view.View;
          import android.widget.Button;
          import android.widget.ProgressBar;
          import android.widget.TextView;
          import android.widget.Toast;
          import androidx.core.content.FileProvider;
          import java.io.File;
          public class InstallActivity extends Activity {
              private TextView titleText, descriptionText;
              private Button installButton;
              private ProgressBar progressBar;
              private String apkPath;
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_install);
                  titleText = findViewById(R.id.titleText);
                  descriptionText = findViewById(R.id.descriptionText);
                  installButton = findViewById(R.id.installButton);
                  progressBar = findViewById(R.id.progressBar);
                  apkPath = getIntent().getStringExtra("apk_path");
                  if (apkPath == null) {
                      Toast.makeText(this, "Ошибка: файл не найден", Toast.LENGTH_SHORT).show();
                      finish();
                      return;
                  }
                  File apkFile = new File(apkPath);
                  titleText.setText("Установить приложение?");
                  descriptionText.setText("Название: " + apkFile.getName() + "\nРазмер: " + (apkFile.length() / 1024) + " KB");
                  installButton.setOnClickListener(v -> installApk());
              }
              private void installApk() {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      if (!getPackageManager().canRequestPackageInstalls()) {
                          Intent intent = new Intent(Settings.ACTION_MANAGE_UNKNOWN_APP_SOURCES);
                          intent.setData(Uri.parse("package:" + getPackageName()));
                          startActivity(intent);
                          Toast.makeText(this, "Разрешите установку из этого источника", Toast.LENGTH_LONG).show();
                          return;
                      }
                  }
                  try {
                      File apkFile = new File(apkPath);
                      if (!apkFile.exists()) {
                          Toast.makeText(this, "Файл не найден", Toast.LENGTH_SHORT).show();
                          return;
                      }
                      progressBar.setVisibility(View.VISIBLE);
                      progressBar.setProgress(0);
                      new Thread(() -> {
                          try {
                              for (int i = 0; i <= 100; i += 10) {
                                  Thread.sleep(100);
                                  int finalI = i;
                                  runOnUiThread(() -> progressBar.setProgress(finalI));
                              }
                              runOnUiThread(() -> {
                                  progressBar.setProgress(100);
                                  Intent intent = new Intent(Intent.ACTION_VIEW);
                                  Uri apkUri = FileProvider.getUriForFile(this, "com.ia.installer.fileprovider", apkFile);
                                  intent.setDataAndType(apkUri, "application/vnd.android.package-archive");
                                  intent.addFlags(Intent.FLAG_GRANT_READ_URI_PERMISSION);
                                  startActivity(intent);
                                  finish();
                              });
                          } catch (Exception e) {
                              runOnUiThread(() -> {
                                  Toast.makeText(this, "Ошибка: " + e.getMessage(), Toast.LENGTH_SHORT).show();
                                  progressBar.setVisibility(View.GONE);
                              });
                          }
                      }).start();
                  } catch (Exception e) {
                      Toast.makeText(this, "Ошибка: " + e.getMessage(), Toast.LENGTH_SHORT).show();
                  }
              }
          }
          EOF

      - name: Create activity_main.xml
        run: |
          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:orientation="vertical"
              android:padding="16dp">
              <TextView
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="IA - Install APK"
                  android:textSize="24sp"
                  android:textStyle="bold"
                  android:layout_marginBottom="16dp" />
              <ListView
                  android:id="@+id/listView"
                  android:layout_width="match_parent"
                  android:layout_height="match_parent" />
          </LinearLayout>
          EOF

      - name: Create activity_install.xml
        run: |
          cat > app/src/main/res/layout/activity_install.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:orientation="vertical"
              android:padding="24dp"
              android:gravity="center">
              <TextView
                  android:id="@+id/titleText"
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="Установить приложение?"
                  android:textSize="22sp"
                  android:textStyle="bold"
                  android:layout_marginBottom="16dp" />
              <TextView
                  android:id="@+id/descriptionText"
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="Название: app.apk"
                  android:textSize="16sp"
                  android:layout_marginBottom="24dp" />
              <ProgressBar
                  android:id="@+id/progressBar"
                  style="?android:attr/progressBarStyleHorizontal"
                  android:layout_width="match_parent"
                  android:layout_height="20dp"
                  android:visibility="gone" />
              <Button
                  android:id="@+id/installButton"
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="📲 Установить"
                  android:textSize="18sp"
                  android:background="#4CAF50"
                  android:textColor="#FFFFFF"
                  android:padding="12dp 24dp"
                  android:layout_marginTop="24dp" />
          </LinearLayout>
          EOF

      - name: Create strings.xml
        run: |
          cat > app/src/main/res/values/strings.xml << 'EOF'
          <resources>
              <string name="app_name">IA</string>
          </resources>
          EOF

      - name: Create file_paths.xml
        run: |
          cat > app/src/main/res/xml/file_paths.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <paths>
              <external-path name="external" path="." />
              <external-files-path name="external_files" path="." />
              <cache-path name="cache" path="." />
              <external-cache-path name="external_cache" path="." />
              <files-path name="files" path="." />
          </paths>
          EOF

      - name: Setup Gradle Wrapper
        run: |
          gradle wrapper
          chmod +x gradlew

      - name: Build Debug APK
        run: |
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: IA-Installer-Debug
          path: app/build/outputs/apk/debug/app-debug.apk
